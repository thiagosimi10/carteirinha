<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Carteirinha de Estudante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #5bbf9e;           /* fundo verde */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
    }

    .card-container {
      width: 100%;
      max-width: 1100px;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .card-container img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .info {
      position: fixed;
      bottom: 8px;
      left: 0;
      right: 0;
      text-align: center;
      color: #ffffffcc;
      font-size: 12px;
    }

    @media (max-width: 600px) {
      .card-container {
        padding: 12px;
      }

      .card-container img {
        border-radius: 14px;
        box-shadow: 0 6px 16px rgba(0,0,0,0.22);
      }
    }
  </style>
</head>
<body>
  <div class="card-container">
    <!-- imagem será definida via JavaScript -->
    <img id="card-image" src="" alt="Carteirinha de Estudante">
  </div>

  <div class="info">
    Use ?pessoa=thiago ou ?pessoa=jessica na URL.
  </div>

  <script>
    // Mapeia o parâmetro "pessoa" para a imagem correspondente
    const imagens = {
      thiago: "oficialthiago.png",
      jessica: "oficialjessica.png"
    };

    // Lê o parâmetro "pessoa" da URL
    const params = new URLSearchParams(window.location.search);
    const pessoa = (params.get("pessoa") || "").toLowerCase();

    // Escolhe a imagem: se não houver ou for inválido, usa uma padrão
    let src = imagens[pessoa];
    if (!src) {
      // imagem padrão (pode ser a do Thiago ou outra)
      src = "img/carteirinha-thiago.jpg";
    }

    // Aplica no elemento <img>
    const img = document.getElementById("card-image");
    img.src = src;
  </script>
</body>
</html>
